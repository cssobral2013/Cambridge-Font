
[buildPlans.CambridgeSans]      # <CambridgeSans> is your plan name
family = "Cambridge Sans"        # Font menu family name
spacing = "quasi-proportional"               # Optional; Values: `normal`, `term`, `fontconfig-mono`, or `fixed`
copyright = "Copyright 2026 The Cambridge Project Authors"
designer = "Cristiano Sobral, Belleve Invis"
serifs = "sans"                  # Optional; Values: `sans` or `slab`
exportGlyphNames = false       # Set this to true for ligature support in Kitty (increased file size)
noCvSs = true
noLigation = true
webfontFormats = ['ttf', 'woff2']


[buildPlans.CambridgeSans.variants.design]
zero = 'oval-unslashed'
one = 'base'
two = 'straight-neck-serifless'
three = 'flat-top-serifless'
four = 'semi-open-serifless'
five = 'oblique-flat-serifless'
six = 'straight-bar'
seven = 'straight-serifless'
eight = 'two-circles'
nine = 'straight-bar'
capital-d = 'more-rounded-serifless'
capital-g = 'toothless-corner-serifless-hooked'
capital-i = 'serifless'
capital-j = 'serifless'
capital-q = 'crossing-baseline'
capital-w = 'straight-almost-flat-top-serifless'
f = 'flat-hook-serifless-crossbar-at-x-height'
g = 'double-storey'
i = 'serifless'
l = 'serifless'
j = 'flat-hook-serifless'
r = 'compact-serifless'
t = 'flat-hook-short-neck2'
w = 'straight-almost-flat-top-serifless'
capital-eszet = 'corner-serifless'
long-s = 'flat-hook-middle-serifed-xh'
eszet = 'sulzbacher-middle-serifed-xh'
lower-eth = 'straight-bar'
lower-iota = 'flat-tailed'
lower-tau = 'tailless'
lower-gamma = 'straight'
lower-upsilon = 'straight-serifless'
lower-pi = 'tailless'
lower-nu = 'straight'
lower-phi = 'straight'
lower-chi = 'straight-serifless'
cyrl-capital-zhe = 'symmetric-touching'
cyrl-zhe = 'symmetric-touching'
cyrl-capital-ka = 'symmetric-touching-serifless'
cyrl-ka = 'symmetric-touching-serifless'
cyrl-capital-u = 'straight-serifless'
cyrl-u = 'straight-serifless'
cyrl-ef = 'serifless'
brace = 'straight'
guillemet = 'straight'
number-sign = 'slanted'
ampersand = 'et-toothless-rounded'
at = 'fourfold'
dollar = 'open-cap'
cent = 'open-cap'
percent = 'rings-continuous-slash-also-connected'
question = 'corner'


[buildPlans.CambridgeSans.variants.oblique]
a = 'single-storey-serifless'
g = 'single-storey-serifless'


[buildPlans.CambridgeSans.slopes.Upright]
angle = 0             # Angle in degrees. Valid range [0, 15]
shape = "upright"     # Slope grade used for shape selection.  `upright` | `oblique` | `italic`
menu  = "upright"     # Slope grade used for naming.           `upright` | `oblique` | `italic`
css   = "normal"      # Slope grade used for webfont CSS.      `normal`  | `oblique` | `italic`

[buildPlans.CambridgeSans.slopes.Italic]
angle = 13
shape = "oblique"
menu  = "italic"
css   = "italic"


[buildPlans.CambridgeSans.widths.Normal]
shape = 600        # Unit Width, measured in 1/1000 em.
menu  = 5          # Width grade for the font's names.
css   = "normal"   # "font-stretch' property of webfont CSS.



[collectPlans.CambridgeSans]
from = ["CambridgeSans"]

[buildPlans.CambridgeSans.metricOverride]
leading = 1080
cap = 700
xHeight = 530
sb = 'default_sb * 0.83'
symbolMid = 300
essRatioLower = 'default_essRatio * 0.93'



